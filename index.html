<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamerz ChorBazaar | AI Gamerz Mall</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff3f6c; --dark: #1a1a1a; --bg: #0f0f0f; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding-top: 80px; background: var(--bg); color: white; overflow-x: hidden; }
        
        /* PREMIUM NAVIGATION */
        nav { position: fixed; top: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; z-index: 1000; box-sizing: border-box; border-bottom: 1px solid #333; }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .nav-logo-img { height: 40px; filter: drop-shadow(0 0 5px var(--pink)); }
        .logo-text { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
        .logo-text span { color: var(--pink); }

        /* AI SEARCH BAR */
        .search-container { flex-grow: 1; margin: 0 40px; max-width: 500px; }
        #aiSearch { width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid #444; background: #222; color: white; outline: none; transition: 0.3s; }
        #aiSearch:focus { border-color: var(--pink); box-shadow: 0 0 15px rgba(255, 63, 108, 0.3); }

        /* HERO SECTION (MERCEDES STYLE) */
        .hero-ad { width: 100%; height: 60vh; background: linear-gradient(to right, rgba(0,0,0,0.8), transparent), url('https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1920'); background-size: cover; background-position: center; display: flex; align-items: center; padding-left: 10%; }
        .hero-content h1 { font-size: 3.5rem; font-weight: 900; margin: 0; line-height: 1; }
        .hero-content p { color: var(--pink); font-weight: 600; letter-spacing: 3px; }

        /* LUXE GRID */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 50px 5%; max-width: 1400px; margin: 0 auto; }
        .card { background: #1a1a1a; border-radius: 20px; overflow: hidden; border: 1px solid #333; transition: 0.4s; position: relative; }
        .card:hover { transform: translateY(-10px); border-color: var(--pink); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .card img { width: 100%; height: 350px; object-fit: cover; transition: 0.5s; }
        .card:hover img { scale: 1.05; }
        
        .card-info { padding: 20px; text-align: left; }
        .ai-badge { font-size: 0.6rem; color: var(--pink); border: 1px solid var(--pink); padding: 3px 10px; border-radius: 50px; text-transform: uppercase; font-weight: 700; }
        .price { font-size: 1.4rem; font-weight: 800; margin: 10px 0; color: white; }
        .buy-btn { background: white; color: black; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .buy-btn:hover { background: var(--pink); color: white; }

        @media (max-width: 768px) {
            nav { flex-direction: column; height: auto; padding: 15px; }
            .search-container { margin: 15px 0; width: 100%; }
            .hero-content h1 { font-size: 2rem; }
            body { padding-top: 160px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo-container" onclick="location.reload()">
        <img src="logo.png" alt="Logo" class="nav-logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2103/2103633.png'">
        <div class="logo-text">Gamerz<span>CHORBAZAAR</span></div>
    </div>
    <div class="search-container">
        <input type="text" id="aiSearch" placeholder="Ask Narrow AI for Luxe Deals..." onkeyup="runAiSearch()">
    </div>
</nav>

<div class="hero-ad">
    <div class="hero-content">
        <p>SPECIAL EDITION</p>
        <h1>PREMIUM<br>Gamerz Choice  </h1>
        <button class="buy-btn" style="width: auto; padding: 15px 40px; margin-top: 20px;">DISCOVER →</button>
    </div>
</div>

<div class="container" id="product-container">
    <p style="grid-column: 1/-1; text-align:center;">Establishing Secure AI Connection...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const _supabase = supabase.createClient(
        'https://nmwxwfswxeidccbntoxg.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5td3h3ZnN3eGVpZGNjYm50b3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTYzMDAsImV4cCI6MjA5MTU3MjMwMH0.0P27CU9Nm1qxUQaoC4dVkdb8CX1sXRIYl6jhuDMnH_0'
    );

    let masterList = [];

    // NARROW AI LOGIC
    function getAiTag(name) {
        const n = name.toLowerCase();
        if (n.includes('chair') || n.includes('seat')) return 'Ergonomic Luxe';
        if (n.includes('phone') || n.includes('tech')) return 'Advanced Tech';
        return 'Luxe Edition';
    }

    async function fetchMall() {
        const { data, error } = await _supabase.from('products').select('*');
        if (data) {
            masterList = data;
            render(masterList);
        }
    }

    function render(list) {
        const container = document.getElementById('product-container');
        container.innerHTML = list.length ? '' : '<p style="grid-column:1/-1; text-align:center;">No Luxe items found.</p>';

        list.forEach(p => {
            let img = p.image_url || 'https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=800';
            let link = (p.link && !p.link.startsWith('http')) ? 'https://' + p.link : p.link;

            container.innerHTML += `
                <div class="card">
                    <img src="${img}" onerror="this.src='https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=800'">
                    <div class="card-info">
                        <span class="ai-badge">${getAiTag(p.name)}</span>
                        <h3 style="margin: 15px 0 5px 0; font-size: 1.1rem;">${p.name}</h3>
                        <div class="price">₹${Number(p.price).toLocaleString()}</div>
                        <button class="buy-btn" onclick="window.open('${link}', '_blank')">VIEW DETAILS</button>
                    </div>
                </div>
            `;
        });
    }

    function runAiSearch() {
        const query = document.getElementById('aiSearch').value.toLowerCase();
        const filtered = masterList.filter(p => p.name.toLowerCase().includes(query) || getAiTag(p.name).toLowerCase().includes(query));
        render(filtered);
    }

    fetchMall();
</script>
</body>
</html>
