<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamerz ChorBazaar | Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00ffaa; 
            --dark: #050506; 
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; color: white;
            background: var(--dark); overflow-x: hidden; height: 100%;
        }

        /* --- STATE 1: LANDING PAGE --- */
        #landing-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; background: #000; transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
            display: flex; align-items: center; justify-content: center;
        }

        /* 2048 x 1152 Video Background */
        .video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; opacity: 0.6;
        }
        .video-container iframe {
            width: 2048px; height: 1152px;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .landing-content {
            position: relative; z-index: 10; text-align: center;
        }

        .landing-content h1 {
            font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 800; 
            text-transform: uppercase; margin: 0 0 40px 0; line-height: 0.9;
        }
        .landing-content h1 span { color: var(--accent); display: block; }

        .start-btn {
            background: transparent; color: white; border: 2px solid var(--accent);
            padding: 20px 60px; font-size: 1rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 5px; cursor: pointer;
            transition: 0.4s; border-radius: 4px;
        }
        .start-btn:hover { background: var(--accent); color: black; box-shadow: 0 0 40px rgba(0, 255, 170, 0.4); }

        /* --- STATE 2: THE MAIN SITE --- */
        #main-site {
            opacity: 0; transition: opacity 1s ease 0.5s;
            padding: 100px 5%; min-height: 100vh;
        }

        /* Header for the Main Site */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: rgba(5, 5, 6, 0.9); backdrop-filter: blur(20px);
            display: flex; align-items: center; padding: 0 5%; z-index: 1000;
            border-bottom: 1px solid var(--border); box-sizing: border-box;
        }

        .inventory-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 30px; margin-top: 80px;
        }

        .card { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden; transition: 0.4s;
        }
        .card:hover { border-color: var(--accent); transform: scale(1.02); }
        .card img { width: 100%; height: 400px; object-fit: cover; }
        .card-info { padding: 25px; }

        /* Hidden Class */
        .page-exit { transform: translateY(-100%); }
        .site-reveal { opacity: 1 !important; }

    </style>
</head>
<body>

<div id="landing-page">
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/Bs8tudsVD0Y?autoplay=1&mute=1&controls=0&loop=1&playlist=Bs8tudsVD0Y&modestbranding=1" 
            frameborder="0">
        </iframe>
    </div>
    
    <div class="landing-content">
        <h1>START BUYING<br><span>YOUR GAMING EQUIPMENT</span></h1>
        <button class="start-btn" onclick="enterSite()">GET STARTED</button>
    </div>
</div>

<nav id="main-nav" style="display:none;">
    <div style="font-weight: 800; letter-spacing: 2px;">GCB // <span style="color:var(--accent)">ARMORY</span></div>
</nav>

<div id="main-site">
    <div style="border-left: 5px solid var(--accent); padding-left: 20px;">
        <h2 style="font-size: 3rem; margin: 0;">PRO INVENTORY</h2>
        <p style="opacity: 0.5; letter-spacing: 3px; font-weight: 600;">ACTIVE DATABASE CONNECTION</p>
    </div>

    <div class="inventory-grid" id="main-grid">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient(
        'https://nmwxwfswxeidccbntoxg.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5td3h3ZnN3eGVpZGNjYm50b3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTYzMDAsImV4cCI6MjA5MTU3MjMwMH0.0P27CU9Nm1qxUQaoC4dVkdb8CX1sXRIYl6jhuDMnH_0'
    );

    // Function to handle the "Redirect" effect
    function enterSite() {
        document.getElementById('landing-page').classList.add('page-exit');
        document.getElementById('main-site').classList.add('site-reveal');
        document.getElementById('main-nav').style.display = 'flex';
        window.scrollTo(0, 0);
    }

    async function load() {
        const { data } = await _supabase.from('products').select('*');
        const grid = document.getElementById('main-grid');
        if (data) {
            grid.innerHTML = '';
            data.forEach(p => {
                grid.innerHTML += `
                    <div class="card" onclick="window.open('${p.link}', '_blank')">
                        <img src="${p.image_url}" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800'">
                        <div class="card-info">
                            <div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 10px;">${p.name}</div>
                            <div style="color: var(--accent); font-weight: 800; font-size: 1.3rem;">₹${Number(p.price).toLocaleString()}</div>
                        </div>
                    </div>`;
            });
        }
    }
    load();
</script>
</body>
</html>
