<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamerz ChorBazaar | Pro Armory</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff3f6c; --dark: #050505; --card: #111113; }

        /* KINETIC NEURAL BACKGROUND */
        body { 
            margin: 0; padding-top: 80px; font-family: 'Montserrat', sans-serif; color: white;
            background: #050505; overflow-x: hidden;
        }

        /* The Live Moving Grid */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 63, 108, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 63, 108, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(60deg);
            transform-origin: top; animation: gridMove 12s linear infinite; z-index: -1;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 50px; } }

        /* NAVIGATION */
        nav { 
            position: fixed; top: 0; width: 100%; height: 80px; 
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 5%; z-index: 1000; box-sizing: border-box;
            border-bottom: 2px solid var(--pink);
        }
        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: 2px; }
        .logo span { color: var(--pink); text-shadow: 0 0 15px var(--pink); }

        /* HERO SECTION (PRESERVED) */
        .hero { 
            width: 100%; height: 60vh; 
            background: linear-gradient(to right, #050505, rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920');
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding: 0 8%; box-sizing: border-box;
        }
        .hero h1 { font-size: 4rem; font-weight: 900; margin: 0; line-height: 0.9; text-transform: uppercase; }
        .hero p { color: var(--pink); letter-spacing: 6px; font-weight: 800; font-size: 0.8rem; margin-bottom: 10px; }

        /* SECTIONS & GRID */
        .section-container { padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
        .section-title { 
            font-size: 1.6rem; font-weight: 900; margin: 50px 0 25px 0; 
            text-transform: uppercase; border-left: 5px solid var(--pink); padding-left: 15px;
            letter-spacing: 2px;
        }
        .items-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px;
        }

        /* PRODUCT CARDS */
        .card { background: var(--card); border: 1px solid #222; transition: 0.4s; overflow: hidden; }
        .card:hover { transform: translateY(-10px); border-color: var(--pink); box-shadow: 0 15px 40px rgba(255, 63, 108, 0.2); }
        .card img { width: 100%; height: 320px; object-fit: cover; filter: brightness(0.8); transition: 0.5s; }
        .card:hover img { filter: brightness(1.1); scale: 1.05; }

        .info { padding: 20px; }
        .price { font-size: 1.5rem; font-weight: 700; color: white; margin: 10px 0; }
        .buy-btn { 
            background: white; color: black; border: none; padding: 12px; width: 100%; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .buy-btn:hover { background: var(--pink); color: white; }

        @media (max-width: 768px) {
            nav { flex-direction: column; height: auto; padding: 15px; }
            .hero h1 { font-size: 2.5rem; }
            body { padding-top: 140px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">GAMERZ <span>CHORBAZAAR</span></div>
    <div style="flex-grow: 1; max-width: 400px; margin: 0 20px;">
        <input type="text" id="aiSearch" placeholder="SEARCH ARMORY..." onkeyup="runAiSearch()" 
        style="width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; outline: none;">
    </div>
</nav>

<div class="hero">
    <div>
        <p>SYSTEM ONLINE</p>
        <h1>ELITE<br>GAMING GEAR</h1>
        <button class="buy-btn" style="width:auto; padding: 15px 40px; margin-top: 25px;">SCAN INVENTORY →</button>
    </div>
</div>

<div class="section-container" id="main-content">
    <p style="text-align: center; padding: 100px; opacity: 0.5;">Loading Gamerz Categories...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient(
        'https://nmwxwfswxeidccbntoxg.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5td3h3ZnN3eGVpZGNjYm50b3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTYzMDAsImV4cCI6MjA5MTU3MjMwMH0.0P27CU9Nm1qxUQaoC4dVkdb8CX1sXRIYl6jhuDMnH_0'
    );

    let masterList = [];

    // AUTO-CATEGORY ENGINE
    function getCategory(name) {
        const n = name.toLowerCase();
        if (n.includes('phone') || n.includes('iphone') || n.includes('mobile')) return 'GAMING PHONES';
        if (n.includes('gpu') || n.includes('rtx') || n.includes('graphics')) return 'GRAPHICS CARDS';
        if (n.includes('chair') || n.includes('seat')) return 'PRO CHAIRS';
        if (n.includes('watch') || n.includes('headset') || n.includes('buds')) return 'GEAR & AUDIO';
        return 'SPECIAL EDITIONS';
    }

    async function fetchInventory() {
        const { data } = await _supabase.from('products').select('*');
        if (data) {
            masterList = data;
            renderSections(masterList);
        }
    }

    function renderSections(list) {
        const main = document.getElementById('main-content');
        main.innerHTML = '';

        const grouped = {};
        list.forEach(p => {
            const cat = getCategory(p.name);
            if (!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(p);
        });

        for (const [title, items] of Object.entries(grouped)) {
            let html = `<div class="section-title">${title}</div><div class="items-grid">`;
            items.forEach(p => {
                html += `
                    <div class="card">
                        <img src="${p.image_url}" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800'">
                        <div class="info">
                            <div style="font-weight:700; height:40px; overflow:hidden;">${p.name}</div>
                            <div class="price">₹${Number(p.price).toLocaleString()}</div>
                            <button class="buy-btn" onclick="window.open('${p.link}', '_blank')">VIEW ITEM</button>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            main.innerHTML += html;
        }
    }

    function runAiSearch() {
        const query = document.getElementById('aiSearch').value.toLowerCase();
        renderSections(masterList.filter(p => p.name.toLowerCase().includes(query)));
    }

    fetchInventory();
</script>
</body>
</html>
