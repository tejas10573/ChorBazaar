<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamerz ChorBazaar | Start Buying</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #00ffaa; 
            --dark: #050506; 
            --border: rgba(255, 255, 255, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; color: white;
            background: var(--dark); scroll-behavior: smooth;
        }

        /* BANNER VIDEO CONTAINER (2048 x 1152) */
        .hero-viewport {
            position: relative; width: 100%; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: #000;
        }

        .video-background {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 56.25vw; /* 2048x1152 aspect ratio math */
            min-height: 100vh; min-width: 177.77vh;
            transform: translate(-50%, -50%);
            pointer-events: none; opacity: 0.5;
        }

        /* GLASS OVERLAY TEXT */
        .hero-content {
            position: relative; z-index: 10; text-align: center;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 800; 
            line-height: 0.95; margin: 0 0 40px 0; text-transform: uppercase;
        }

        .hero-content h1 span { color: var(--accent); display: block; }

        /* THE REDIRECTION BUTTON */
        .get-started-btn {
            background: transparent; color: white; border: 2px solid white;
            padding: 20px 60px; font-size: 1rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 4px; cursor: pointer;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            border-radius: 2px;
        }

        .get-started-btn:hover {
            background: white; color: black; transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        /* MAIN SITE SECTION */
        .main-site-section {
            min-height: 100vh; padding: 100px 5%;
            background: radial-gradient(circle at top, #111 0%, var(--dark) 100%);
        }

        .inventory-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 40px; margin-top: 60px;
        }

        .card { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden; transition: 0.4s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .card img { width: 100%; height: 350px; object-fit: cover; filter: brightness(0.8); }
        .card-info { padding: 25px; }

    </style>
</head>
<body>

<div class="hero-viewport">
    <div class="video-background">
        <iframe 
            width="2048" height="1152"
            src="https://www.youtube.com/embed/Bs8tudsVD0Y?autoplay=1&mute=1&controls=0&loop=1&playlist=Bs8tudsVD0Y&modestbranding=1" 
            frameborder="0" allow="autoplay; encrypted-media">
        </iframe>
    </div>
    
    <div class="hero-content">
        <h1>START BUYING<br><span>YOUR GAMING EQUIPMENT</span></h1>
        <button class="get-started-btn" onclick="document.getElementById('shop').scrollIntoView();">GET STARTED</button>
    </div>
</div>

<div id="shop" class="main-site-section">
    <div style="border-left: 4px solid var(--accent); padding-left: 20px;">
        <h2 style="font-size: 2.5rem; margin: 0;">ELITE INVENTORY</h2>
        <p style="opacity: 0.5; letter-spacing: 2px;">AUTHENTICATED GAMING GEAR</p>
    </div>

    <div class="inventory-grid" id="main-grid">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient(
        'https://nmwxwfswxeidccbntoxg.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5td3h3ZnN3eGVpZGNjYm50b3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTYzMDAsImV4cCI6MjA5MTU3MjMwMH0.0P27CU9Nm1qxUQaoC4dVkdb8CX1sXRIYl6jhuDMnH_0'
    );

    async function load() {
        const { data } = await _supabase.from('products').select('*');
        const grid = document.getElementById('main-grid');
        if (data) {
            grid.innerHTML = '';
            data.forEach(p => {
                grid.innerHTML += `
                    <div class="card" onclick="window.open('${p.link}', '_blank')">
                        <img src="${p.image_url}" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800'">
                        <div class="card-info">
                            <div style="font-weight: 800; font-size: 1.2rem; margin-bottom: 10px;">${p.name}</div>
                            <div style="color: var(--accent); font-weight: 800;">₹${Number(p.price).toLocaleString()}</div>
                        </div>
                    </div>`;
            });
        }
    }
    load();
</script>
</body>
</html>
