<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamerz ChorBazaar | Infinity Armory</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff3f6c; --cyan: #00f2ff; --dark: #020205; }

        /* THE INFINITY LIVE BACKGROUND */
        body { 
            margin: 0; padding-top: 80px; font-family: 'Montserrat', sans-serif; color: white;
            background: var(--dark); overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 63, 108, 0.1) 0%, transparent 80%),
                radial-gradient(circle at 20% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
        }

        /* Animated Star Field & Moving Grid */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1px 1px at 25% 35%, #fff 100%, transparent),
                radial-gradient(1px 1px at 50% 70%, #fff 100%, transparent),
                radial-gradient(2px 2px at 10% 20%, rgba(255,63,108,0.5) 100%, transparent),
                linear-gradient(rgba(255, 63, 108, 0.1) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(255, 63, 108, 0.1) 1px, transparent 1px);
            background-size: 150px 150px, 200px 200px, 300px 300px, 60px 60px, 60px 60px;
            transform: perspective(600px) rotateX(45deg);
            transform-origin: center; animation: spaceTravel 10s linear infinite; z-index: -1;
        }

        @keyframes spaceTravel {
            from { background-position: 0 0; }
            to { background-position: 0 500px; }
        }

        /* NAVIGATION */
        nav { 
            position: fixed; top: 0; width: 100%; height: 80px; 
            background: rgba(2, 2, 5, 0.9); backdrop-filter: blur(30px); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 5%; z-index: 1000; box-sizing: border-box;
            border-bottom: 2px solid var(--pink); box-shadow: 0 0 20px rgba(255, 63, 108, 0.3);
        }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; }
        .logo span { color: var(--pink); text-shadow: 0 0 15px var(--pink); }

        /* HERO SECTION (STAYS PERMANENT) */
        .hero { 
            width: 100%; height: 60vh; 
            background: linear-gradient(to right, #020205, transparent), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920');
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding: 0 8%; box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hero h1 { font-size: 4.5rem; font-weight: 900; line-height: 0.9; margin: 0; text-transform: uppercase; }
        .hero p { color: var(--pink); letter-spacing: 10px; font-weight: 800; font-size: 0.8rem; margin-bottom: 20px; }

        /* ULTRA ATTRACTIVE GRID */
        .container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 40px; padding: 80px 5%; max-width: 1600px; margin: 0 auto; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); border-radius: 0px; 
            transition: 0.5s; position: relative; overflow: hidden;
        }
        .card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--pink), transparent 30%);
            animation: rotateGlow 4s linear infinite; opacity: 0; transition: 0.5s;
        }
        .card:hover::before { opacity: 1; }
        .card:hover { transform: scale(1.05) translateY(-10px); border-color: var(--pink); box-shadow: 0 0 40px rgba(255, 63, 108, 0.4); }

        @keyframes rotateGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .card-inner { position: relative; background: #08080a; margin: 2px; z-index: 1; }
        .card img { width: 100%; height: 380px; object-fit: cover; filter: grayscale(40%); transition: 0.5s; }
        .card:hover img { filter: grayscale(0%); scale: 1.1; }

        .info { padding: 25px; background: rgba(0,0,0,0.8); }
        .name { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; height: 45px; overflow: hidden; }
        .price { font-size: 1.8rem; font-weight: 900; color: #fff; margin-bottom: 20px; font-family: 'Montserrat', sans-serif; }
        
        .buy-btn { 
            background: var(--pink); color: white; border: none; padding: 15px; width: 100%; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
        }
        .buy-btn:hover { background: white; color: black; }

        @media (max-width: 768px) {
            nav { flex-direction: column; height: auto; padding: 15px; }
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">GAMERZ <span>CHORBAZAAR</span></div>
    <div style="flex-grow: 1; max-width: 450px; margin: 0 30px;">
        <input type="text" id="aiSearch" placeholder="SCANNING NEURAL NETWORK..." onkeyup="runAiSearch()" 
        style="width: 100%; padding: 12px 25px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: white; border-radius: 4px; outline: none;">
    </div>
</nav>

<div class="hero">
    <div>
        <p>NEURAL LINK ESTABLISHED</p>
        <h1>INFINITY<br>GAMERZ ARMORY</h1>
        <button class="buy-btn" style="width:auto; padding: 15px 50px; margin-top: 30px;">DOWNLOAD DEALS ↓</button>
    </div>
</div>

<div class="container" id="product-container">
    <p style="grid-column: 1/-1; text-align:center; opacity:0.5; letter-spacing:5px;">INITIATING CORE SYNC...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient(
        'https://nmwxwfswxeidccbntoxg.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5td3h3ZnN3eGVpZGNjYm50b3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTYzMDAsImV4cCI6MjA5MTU3MjMwMH0.0P27CU9Nm1qxUQaoC4dVkdb8CX1sXRIYl6jhuDMnH_0'
    );

    let masterList = [];

    async function fetchInventory() {
        const { data } = await _supabase.from('products').select('*');
        if (data) {
            masterList = data;
            render(masterList);
        }
    }

    function render(list) {
        const container = document.getElementById('product-container');
        container.innerHTML = '';
        
        list.forEach(p => {
            let img = p.image_url || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800';
            container.innerHTML += `
                <div class="card">
                    <div class="card-inner">
                        <img src="${img}">
                        <div class="info">
                            <div class="name">${p.name}</div>
                            <div class="price">₹${Number(p.price).toLocaleString()}</div>
                            <button class="buy-btn" onclick="window.open('${p.link}', '_blank')">UNBOX DEAL</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function runAiSearch() {
        const query = document.getElementById('aiSearch').value.toLowerCase();
        render(masterList.filter(p => p.name.toLowerCase().includes(query)));
    }

    fetchInventory();
</script>
</body>
</html>
