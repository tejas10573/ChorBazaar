<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChorBazaar | Luxe Mall</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff3f6c; --dark: #282c3f; --blue: #00d2ff; --bg-gray: #f5f5f6; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding-top: 80px; background: white; color: var(--dark); overflow-x: hidden; }
        
        nav { position: fixed; top: 0; width: 100%; height: 80px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 1000; box-sizing: border-box; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--pink); letter-spacing: -1px; cursor: pointer; }
        .search-container { flex-grow: 1; margin: 0 40px; max-width: 500px; position: relative; }
        #mainSearch { width: 100%; padding: 12px 20px 12px 40px; border-radius: 8px; border: 1px solid #eee; background: var(--bg-gray); outline: none; font-family: 'Montserrat'; }
        .nav-icons { display: flex; gap: 25px; align-items: center; font-size: 0.7rem; font-weight: 700; cursor: pointer; }

        .places-bar { background: white; display: flex; justify-content: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #eee; position: sticky; top: 80px; z-index: 999; }
        .place-btn { padding: 8px 18px; border-radius: 20px; border: 1px solid #ddd; background: white; font-weight: 700; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        .place-btn.active { background: var(--pink); color: white; border-color: var(--pink); }

        .hero-ad { width: 100%; height: 60vh; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1483985988355-763728e1935b?q=80&w=1920&auto=format&fit=crop'); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .ad-box { background: rgba(40, 44, 63, 0.7); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); max-width: 550px; }
        .ad-box h1 { font-size: 3rem; margin: 0; font-weight: 800; text-transform: uppercase; }

        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
        .card { border-radius: 12px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; position: relative; background: white; }
        .card img { width: 100%; height: 320px; object-fit: cover; }
        .wish-icon { position: absolute; top: 15px; right: 15px; background: white; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #ccc; }
        .wish-icon.active { color: var(--pink); }
        .card-info { padding: 15px; text-align: center; }
        .price { font-size: 1.2rem; color: var(--pink); font-weight: 800; margin: 8px 0; }
        .buy-btn { background: var(--dark); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .admin-gear { position: fixed; bottom: 20px; left: 20px; opacity: 0.1; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="filterPlace('All')">ChorBazaar</div>
    <div class="search-container">
        <input type="text" id="mainSearch" placeholder="Search brands or items..." onkeyup="runSearch()">
    </div>
    <div class="nav-icons">
        <div onclick="openM('wishM')">❤️ WISHLIST</div>
        <div onclick="openM('loginM')">👤 LOGIN</div>
    </div>
</nav>

<div class="places-bar">
    <button class="place-btn active" onclick="filterPlace('All', this)">All</button>
    <button class="place-btn" onclick="filterPlace('Fashion', this)">Fashion</button>
    <button class="place-btn" onclick="filterPlace('Tech', this)">Tech</button>
    <button class="place-btn" onclick="filterPlace('Home', this)">Home</button>
</div>

<div class="hero-ad">
    <div class="ad-box">
        <p style="color: var(--blue); font-weight: 800; letter-spacing: 2px; margin:0;">GRAND OPENING</p>
        <h1>CHORBAZAAR LUXE</h1>
        <p>Your curated selection of everything premium.</p>
        <button class="buy-btn" style="width: auto; padding: 15px 40px;" onclick="document.getElementById('productGrid').scrollIntoView({behavior:'smooth'})">Explore Mall</button>
    </div>
</div>

<div class="container" id="productGrid">
    <p id="emptyMsg" style="grid-column: 1/-1; text-align:center; padding: 50px; opacity:0.5;">Welcome! We are currently stocking our shelves. Check back soon!</p>
</div>

<div id="adminM" class="modal">
    <div class="modal-content">
        <h3>Add Product (Admin Only)</h3>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="text" id="pPrice" placeholder="Price">
        <select id="pPlace">
            <option value="Fashion">Fashion</option>
            <option value="Tech">Tech</option>
            <option value="Home">Home</option>
        </select>
        <input type="text" id="pImg" placeholder="Image URL">
        <input type="text" id="pLink" placeholder="Purchase Link">
        <button class="buy-btn" onclick="saveProduct()">Upload to Mall</button>
        <button onclick="closeM('adminM')" style="background:none; border:none; width:100%; margin-top:10px; color:gray; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="wishM" class="modal"><div class="modal-content"><h3>Wishlist ❤️</h3><div id="wishItems"></div><button class="buy-btn" onclick="closeM('wishM')">Close</button></div></div>
<div id="loginM" class="modal"><div class="modal-content"><h3>Sign In</h3><input type="email" placeholder="Email"><input type="password" placeholder="Password"><button class="buy-btn" onclick="closeM('loginM')">Login</button></div></div>
<div class="admin-gear" onclick="checkAdmin()">⚙️</div>

<script>
    // --- STARTING WITH ZERO PRODUCTS ---
    let products = JSON.parse(localStorage.getItem('cb_v9_data')) || [];
    let wishlist = JSON.parse(localStorage.getItem('cb_wishlist')) || [];
    let currentFilter = 'All';

    function render(data = products) {
        const grid = document.getElementById('productGrid');
        let filtered = data.filter(p => currentFilter === 'All' || p.place === currentFilter);
        
        if (filtered.length === 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; padding: 50px; opacity:0.5;">No products found in this section.</p>`;
            return;
        }

        grid.innerHTML = filtered.map(p => {
            const isWished = wishlist.some(w => w.name === p.name);
            return `
            <div class="card">
                <div class="wish-icon ${isWished ? 'active' : ''}" onclick="toggleWish('${p.name}')">❤️</div>
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/400x500?text=Image+Missing'">
                <div class="card-info">
                    <span style="font-size:0.6rem; font-weight:800; color:var(--pink);">${p.place.toUpperCase()}</span>
                    <h4>${p.name}</h4>
                    <div class="price">₹${parseInt(p.price).toLocaleString()}</div>
                    <button class="buy-btn" onclick="window.open('${p.link}', '_blank')">View Deal</button>
                </div>
            </div>
        `}).join('');
    }

    window.toggleWish = function(name) {
        const idx = wishlist.findIndex(w => w.name === name);
        if(idx > -1) wishlist.splice(idx, 1);
        else wishlist.push(products.find(p => p.name === name));
        localStorage.setItem('cb_wishlist', JSON.stringify(wishlist));
        render();
    }

    window.runSearch = function() {
        const q = document.getElementById('mainSearch').value.toLowerCase();
        render(products.filter(p => p.name.toLowerCase().includes(q)));
    }

    window.filterPlace = function(place, btn) {
        currentFilter = place;
        document.querySelectorAll('.place-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        render();
    }

    function openM(id) { document.getElementById(id).style.display = 'flex'; if(id==='wishM') updateWishModal(); }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function checkAdmin() { if(prompt("Admin Key:") === "admin123") openM('adminM'); }

    function saveProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const place = document.getElementById('pPlace').value;
        const img = document.getElementById('pImg').value;
        const link = document.getElementById('pLink').value;
        if(name && price) {
            products.push({name, price, place, img, link});
            localStorage.setItem('cb_v9_data', JSON.stringify(products));
            render(); closeM('adminM');
        }
    }

    function updateWishModal() {
        const cont = document.getElementById('wishItems');
        cont.innerHTML = wishlist.length === 0 ? "No favorites yet!" : wishlist.map(w => `<p>${w.name} - ₹${w.price}</p>`).join('');
    }

    render();
</script>
</body>
</html>
