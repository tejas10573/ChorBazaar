<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamerz ChorBazaar | Elite Armory</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff3f6c; --neon: #00f2ff; --dark: #050505; --card: #111113; }

        /* KINETIC NEURAL BACKGROUND */
        body { 
            margin: 0; padding-top: 80px; font-family: 'Montserrat', sans-serif; color: white;
            background: radial-gradient(circle at center, #1a1a1d 0%, #050505 100%);
            background-attachment: fixed; overflow-x: hidden;
        }

        /* Animated Grid Overlay */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 63, 108, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255, 63, 108, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(60deg);
            transform-origin: top; animation: gridMove 10s linear infinite; z-index: -1;
        }

        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 50px; } }

        /* NAVIGATION */
        nav { 
            position: fixed; top: 0; width: 100%; height: 80px; 
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 5%; z-index: 1000; box-sizing: border-box;
            border-bottom: 2px solid var(--pink);
        }
        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: 2px; }
        .logo span { color: var(--pink); text-shadow: 0 0 15px var(--pink); }

        /* SECTIONS */
        .section-container { padding: 40px 5%; max-width: 1400px; margin: 0 auto; }
        .section-title { 
            font-size: 1.8rem; font-weight: 900; margin-bottom: 25px; 
            display: flex; align-items: center; gap: 15px; text-transform: uppercase;
            border-left: 5px solid var(--pink); padding-left: 15px;
        }

        /* GRID LAYOUT */
        .items-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; margin-bottom: 60px;
        }

        .card { 
            background: var(--card); border: 1px solid #222; transition: 0.4s; 
            position: relative; overflow: hidden; border-radius: 4px;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--pink); box-shadow: 0 15px 40px rgba(255, 63, 108, 0.2); }
        
        .card img { width: 100%; height: 320px; object-fit: cover; filter: brightness(0.8); transition: 0.5s; }
        .card:hover img { filter: brightness(1.1); scale: 1.05; }

        .info { padding: 20px; border-top: 1px solid #222; }
        .price { font-size: 1.4rem; font-weight: 700; color: white; margin: 10px 0; }
        .buy-btn { 
            background: white; color: black; border: none; padding: 12px; width: 100%; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .buy-btn:hover { background: var(--pink); color: white; }

        /* CATEGORY TAGS */
        .category-tag { font-size: 0.6rem; background: #222; padding: 4px 10px; border-radius: 2px; color: var(--pink); font-weight: 800; }

        @media (max-width: 768px) {
            nav { flex-direction: column; height: auto; padding: 15px; }
            body { padding-top: 140px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">GAMERZ <span>CHORBAZAAR</span></div>
    <div style="flex-grow: 1; max-width: 400px; margin: 0 20px;">
        <input type="text" id="aiSearch" placeholder="SEARCH ARMORY..." onkeyup="runAiSearch()" 
        style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: white; border-radius: 4px;">
    </div>
</nav>

<div class="section-container" id="main-content">
    <p style="text-align: center; padding: 100px; opacity: 0.5;">Initializing Gamerz Hardware Sections...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient(
        'https://nmwxwfswxeidccbntoxg.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5td3h3ZnN3eGVpZGNjYm50b3hnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTYzMDAsImV4cCI6MjA5MTU3MjMwMH0.0P27CU9Nm1qxUQaoC4dVkdb8CX1sXRIYl6jhuDMnH_0'
    );

    let masterList = [];

    // NARROW AI: CATEGORY IDENTIFIER
    function identifyCategory(name) {
        const n = name.toLowerCase();
        if (n.includes('phone') || n.includes('iphone') || n.includes('samsung') || n.includes('mobile')) return 'MOBILES & RIGS';
        if (n.includes('gpu') || n.includes('nvidia') || n.includes('graphics') || n.includes('rtx')) return 'GRAPHICS CARDS (GPU)';
        if (n.includes('chair') || n.includes('seat')) return 'GAMING THRONES';
        if (n.includes('watch') || n.includes('buds') || n.includes('headset')) return 'PERIPHERALS';
        return 'ELITE SELECTION';
    }

    async function fetchInventory() {
        const { data } = await _supabase.from('products').select('*');
        if (data) {
            masterList = data;
            organizeAndRender(masterList);
        }
    }

    function organizeAndRender(list) {
        const mainContent = document.getElementById('main-content');
        mainContent.innerHTML = '';

        // Group products by AI Category
        const categories = {};
        list.forEach(p => {
            const cat = identifyCategory(p.name);
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(p);
        });

        // Create Sections
        for (const [title, items] of Object.entries(categories)) {
            let sectionHTML = `
                <div class="section-title">${title} <small style="font-size:0.8rem; color:var(--pink); margin-left:auto;">${items.length} ITEMS</small></div>
                <div class="items-grid">
            `;

            items.forEach(p => {
                sectionHTML += `
                    <div class="card">
                        <img src="${p.image_url}" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800'">
                        <div class="info">
                            <span class="category-tag">PRO-GRADE</span>
                            <div style="font-weight:700; margin:10px 0; height:40px; overflow:hidden;">${p.name}</div>
                            <div class="price">₹${Number(p.price).toLocaleString()}</div>
                            <button class="buy-btn" onclick="window.open('${p.link}', '_blank')">UNBOX DEAL</button>
                        </div>
                    </div>
                `;
            });

            sectionHTML += `</div>`;
            mainContent.innerHTML += sectionHTML;
        }
    }

    function runAiSearch() {
        const query = document.getElementById('aiSearch').value.toLowerCase();
        const filtered = masterList.filter(p => p.name.toLowerCase().includes(query));
        organizeAndRender(filtered);
    }

    fetchInventory();
</script>
</body>
</html>
